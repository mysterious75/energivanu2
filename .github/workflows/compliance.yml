# Compliance CI — Block PRs containing NC-licensed data contamination.
name: Compliance Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  nc-compliance:
    name: NC-Licence Compliance Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff-based checks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run compliance scanner
        id: compliance
        run: |
          python scripts/check_compliance.py --root . --format json > compliance-report.json
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          cat compliance-report.json
          exit $EXIT_CODE

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.json
          retention-days: 30

      - name: Comment on PR (if violations found)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('compliance-report.json', 'utf8'));
            } catch (e) {
              report = { violations: [], error: 'Could not parse report' };
            }

            const violationCount = report.violation_count || report.violations?.length || 0;
            let body = `## ❌ NC-Licence Compliance Failed\n\n`;
            body += `**${violationCount} violation(s) detected.** This PR cannot be merged.\n\n`;

            if (report.violations && report.violations.length > 0) {
              body += `| File | Line | Category | Issue |\n`;
              body += `|------|------|----------|-------|\n`;
              for (const v of report.violations.slice(0, 50)) {
                body += `| \`${v.file}\` | ${v.line} | ${v.category} | ${v.message} |\n`;
              }
              if (report.violations.length > 50) {
                body += `\n*...and ${report.violations.length - 50} more violations*\n`;
              }
            }

            body += `\n### What to do\n`;
            body += `1. Remove any NC-licensed data files (York, MIT Supercloud, etc.)\n`;
            body += `2. Remove references to CC BY-NC-ND datasets from code\n`;
            body += `3. Re-run \`python scripts/check_compliance.py\` locally to verify\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
